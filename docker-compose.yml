services:
  mysql:
    image: mysql:8.0
    container_name: hospital-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: hospitaldb
      MYSQL_USER: hospital
      MYSQL_PASSWORD: hospital
      TZ: UTC
    ports:
      - "3306:3306"
    volumes:
      - ./docker/mysql/initdb:/docker-entrypoint-initdb.d
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "hospital", "-phospital"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hospital-app
    ports:
      - "8080:8080"
    environment:
      - DB_URL=jdbc:mysql://mysql:3306/hospitaldb?useSSL=false&serverTimezone=UTC
      - DB_USER=hospital
      - DB_PASSWORD=hospital
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
